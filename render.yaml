services:
  - type: web
    name: caresync-backend
    env: python
    region: singapore
    buildCommand: "uv sync"
    startCommand: "fastapi run patient_care_backend/main.py --host 0.0.0.0 --port $PORT"
    envVars:
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: TRUSTED_HOSTS
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.5
